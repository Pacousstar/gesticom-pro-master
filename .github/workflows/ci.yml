name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          DATABASE_URL="file:./prisma/test-e2e.db" npx prisma db push --force-reset --accept-data-loss
          DATABASE_URL="file:./prisma/test-e2e.db" npx prisma db seed
          DATABASE_URL="file:./prisma/test-e2e.db" npm run dev &
          sleep 15
          curl --retry 10 --retry-delay 3 --retry-connrefused http://localhost:3000/login

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
